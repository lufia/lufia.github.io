name: Deploy

on:
  push:
    branches:
    - main
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: lufia/setup-plan9port@151766c60eb37fae334741ced086cdfb107d40cf # v3.0.0
      with:
        environment: ubuntu-latest
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: lufia/contrib
        path: .contrib
    - name: install wf
      run: |
        cd .contrib/src/cmd/wf
        mk -f mkfile.unix install
      shell: rc {0}
    - name: install mapsvg
      run: |
        cd .contrib/src/games
        install -m 755 mapsvg $PLAN9/bin
        sed -i '1c #!'^$PLAN9^'/bin/rc' $PLAN9/bin/mapsvg
      shell: rc {0}

    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '22.x'
    - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      with:
        static_site_generator: next
    - name: build static files
      run: |
        mkdir -p dist
        touch dist/.nojekyll
        npm install
        npm run build
    - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
      with:
        path: dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      id: deployment
