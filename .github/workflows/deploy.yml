name: Deploy

on:
  push:
    branches:
    - main
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - uses: lufia/setup-plan9port@3a66af10dc93e741aa78ea3377289a3fd8ad2b5f # v4.0.0
      with:
        environment: ubuntu-latest
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: lufia/contrib
        path: .contrib
    - name: install wf
      run: |
        cd .contrib/src/cmd/wf
        mk -f mkfile.unix install
      shell: rc {0}
    - name: install mapsvg
      run: |
        cd .contrib/src/games
        install -m 755 mapsvg $PLAN9/bin
        sed -i '1c #!'^$PLAN9^'/bin/rc' $PLAN9/bin/mapsvg
      shell: rc {0}

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22.x'
    - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      with:
        static_site_generator: next
    - name: build static files
      run: |
        mkdir -p dist
        touch dist/.nojekyll
        npm install
        npm run build
    - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
      with:
        path: dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      id: deployment
